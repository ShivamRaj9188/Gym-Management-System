services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: ${DB_USERNAME:-shivamraj}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-9188}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shivamraj}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./gym-backend
    ports:
      - "9999:9999"
    environment:
      DB_USERNAME: ${DB_USERNAME:-shivamraj}
      DB_PASSWORD: ${DB_PASSWORD:-9188}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-a-long-random-string}
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./gym-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
