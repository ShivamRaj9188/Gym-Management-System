server:
  port: 9999
  # OWASP: Never expose internal error details to clients
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: gym@example.com
    password: dummy
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: ${DB_USERNAME:shivamraj}
    password: ${DB_PASSWORD:9188}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-alignment.sql

jwt:
  secret: ${JWT_SECRET:change-this-secret-to-a-long-random-string}
  expiration-ms: 86400000

cors:
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
