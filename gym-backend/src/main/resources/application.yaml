server:
  port: 9999
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: ${DB_USERNAME:shivamraj}
    password: ${DB_PASSWORD:9188}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-alignment.sql

jwt:
  secret: ${JWT_SECRET:change-this-secret-to-a-long-random-string}
  expiration-ms: 86400000
