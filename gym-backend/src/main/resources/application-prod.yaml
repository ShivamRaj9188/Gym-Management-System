server:
  port: 8080
  address: 0.0.0.0
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:gym@example.com}
    password: ${MAIL_PASSWORD:***REMOVED***}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${SPRING_DATASOURCE_URL}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
  sql:
    init:
      mode: never
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=50,expireAfterWrite=30s

jwt:
  secret: ${JWT_SECRET:change-this-secret-to-a-long-random-string}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ORIGINS:*}
